name: lifestream_doctor
description: >-
  Crash reporting SDK for Lifestream Vault — captures exceptions and
  uploads reports as searchable Markdown documents.
version: 1.0.2
repository: https://github.com/lifestreamdynamics/lifestream-vault-doctor-dart
issue_tracker: https://github.com/lifestreamdynamics/lifestream-vault-doctor-dart/issues

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  http: ^1.2.0
  crypto: ^3.0.3
  uuid: ^4.4.0

dev_dependencies:
  test: ^1.25.0
  mocktail: ^1.0.3
  fake_async: ^1.3.1
  lints: ^4.0.0
